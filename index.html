<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="neon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر النخبة | تسوق بأمان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --neon-glow: 0 0 10px #6366f1, 0 0 20px #6366f1;
            --border-color: rgba(99, 102, 241, 0.3);
        }
        
        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --neon-glow: none;
            --border-color: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --text-color: #f3f4f6;
            --card-bg: #1f2937;
            --primary: #3b82f6;
            --neon-glow: none;
            --border-color: #374151;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            scroll-behavior: smooth; 
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.5s ease;
        }

        /* 3D Floating Shapes Background */
        .shapes-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; perspective: 1000px; }
        .shape-3d { 
            position: absolute; 
            border: 2px solid var(--primary); 
            box-shadow: inset 0 0 15px rgba(99, 102, 241, 0.2), 0 0 15px rgba(99, 102, 241, 0.2); 
            background: transparent; 
            animation: float3d linear infinite; 
            transform-style: preserve-3d;
        }
        
        @keyframes float3d {
            0% { transform: translateY(110vh) rotateX(0deg) rotateY(0deg) rotateZ(0deg); opacity: 0.8; }
            100% { transform: translateY(-20vh) rotateX(360deg) rotateY(360deg) rotateZ(180deg); opacity: 0; }
        }

        /* Neon Text & Cards */
        [data-theme="neon"] .neon-text { text-shadow: var(--neon-glow); }
        .product-card { background: var(--card-bg); border: 1px solid var(--border-color); backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-10px); box-shadow: var(--neon-glow); }
        .nav-glass { background: var(--card-bg); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color); }
        
        /* Modals & Inputs */
        .custom-input { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
        .custom-input:focus { outline: none; border-color: var(--primary); box-shadow: var(--neon-glow); }
        .loader { border: 3px solid transparent; border-top: 3px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="relative">

    <div class="shapes-bg" id="shapesContainer"></div>

    <nav class="sticky top-0 z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white font-black" style="background: var(--primary); box-shadow: var(--neon-glow);">S</div>
                    <span class="text-2xl font-extrabold tracking-tight neon-text">SMART <span style="color: var(--primary);">SHOP</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <select id="themeSwitcher" onchange="changeTheme(this.value)" class="text-sm rounded-lg p-2 custom-input cursor-pointer font-bold">
                        <option value="neon">ثيم النيون (الأساسي)</option>
                        <option value="dark">ثيم داكن</option>
                        <option value="light">ثيم فاتح</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <header class="relative py-24 text-center z-10">
        <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight neon-text">أقوى العروض بـ <span style="color: var(--primary);">أقل سعر</span></h1>
        <p class="text-xl max-w-2xl mx-auto mb-10 opacity-90">توصيل سريع لباب البيت، والدفع بعد المعاينة.</p>
        <a href="#products-section" class="inline-block px-10 py-4 rounded-full font-bold text-lg text-white transition transform hover:scale-105" style="background: var(--primary); box-shadow: var(--neon-glow);">تصفح المنتجات الآن</a>
    </header>

    <section id="products-section" class="max-w-7xl mx-auto px-4 py-10 z-10 relative">
        <div class="flex items-center justify-between mb-12">
            <h2 class="text-3xl font-extrabold border-r-4 pr-4 neon-text" style="border-color: var(--primary);">منتجاتنا المختارة</h2>
            <div class="h-px flex-1 ml-8" style="background: var(--border-color);"></div>
        </div>
        
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </section>

    <div id="orderModal" class="fixed inset-0 z-[100] hidden overflow-y-auto px-4 flex items-center justify-center">
        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm transition-opacity" onclick="closeModal('orderModal')"></div>
        <div class="relative rounded-3xl shadow-2xl max-w-xl w-full overflow-hidden transform transition-all border p-8" style="background: var(--bg-color); border-color: var(--primary); box-shadow: var(--neon-glow);">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold neon-text">إتمام الطلب</h2>
                <button onclick="closeModal('orderModal')" class="text-2xl opacity-70 hover:opacity-100">&times;</button>
            </div>

            <form id="taagerForm" class="space-y-4">
                <input type="hidden" id="prod_id">
                <input type="hidden" id="prod_price">
                <input type="hidden" id="prod_name">

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-90">الاسم بالكامل</label>
                        <input type="text" id="cust_name" required class="w-full px-4 py-3 rounded-xl custom-input">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-90">الكمية المطلوبة</label>
                        <input type="number" id="cust_qty" min="1" value="1" required class="w-full px-4 py-3 rounded-xl custom-input text-center font-bold">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-90">رقم الهاتف الأساسي</label>
                        <input type="tel" id="cust_phone" required class="w-full px-4 py-3 rounded-xl custom-input text-left" dir="ltr">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-90">رقم هاتف احتياطي</label>
                        <input type="tel" id="cust_phone2" class="w-full px-4 py-3 rounded-xl custom-input text-left" dir="ltr">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-90">المحافظة</label>
                        <input type="text" id="cust_province" required class="w-full px-4 py-3 rounded-xl custom-input">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-90">المدينة/المنطقة</label>
                        <input type="text" id="cust_city" required class="w-full px-4 py-3 rounded-xl custom-input">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-90">اسم الشارع</label>
                        <input type="text" id="cust_street" required class="w-full px-3 py-3 rounded-xl custom-input">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-90">رقم العمارة</label>
                        <input type="text" id="cust_building" required class="w-full px-3 py-3 rounded-xl custom-input">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 opacity-90">رقم الشقة</label>
                        <input type="text" id="cust_apt" required class="w-full px-3 py-3 rounded-xl custom-input">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full text-white font-black py-4 mt-4 rounded-xl transition-all transform active:scale-95 flex justify-center items-center gap-2" style="background: var(--primary); box-shadow: var(--neon-glow);">
                    تأكيد الطلب الآن (دفع عند الاستلام)
                </button>
            </form>
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center px-4">
        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="relative bg-green-600 rounded-3xl shadow-2xl p-8 text-center text-white max-w-sm w-full transform scale-100 transition-all border-2 border-green-400" style="box-shadow: 0 0 30px #16a34a;">
            <div class="text-6xl mb-4">✔️</div>
            <h2 class="text-3xl font-black mb-2">تم الطلب بنجاح!</h2>
            <p class="mb-6 font-bold opacity-90">سنتواصل معك قريباً لتأكيد الشحن.</p>
            <button onclick="closeModal('successModal')" class="bg-white text-green-700 w-full py-3 rounded-xl font-bold hover:bg-gray-100 transition">إغلاق</button>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 1. مصفوفة المنتجات (أضف منتجاتك هنا بسهولة تامة)
        // ----------------------------------------------------
        const productsList = [
            {
                id: "EG050401",
                name: "طقم محولات لقم شنيور للفك والربط",
                price: 150,
                oldPrice: 195,
                image: "p1.png",
                description: "طقم احترافي عالي الجودة يناسب جميع الأعمال."
            },
            {
                id: "EG050402",
                name: "ساعة ذكية رياضية ضد الماء",
                price: 350,
                oldPrice: 500,
                image: "https://via.placeholder.com/400",
                description: "تدعم قياس النبض، واستقبال الإشعارات."
            }
            // يمكنك نسخ البلوك السابق ولصقه لإضافة منتج ثالث ورابع...
        ];

        // ----------------------------------------------------
        // 2. إعدادات البوت
        // ----------------------------------------------------
        const TELEGRAM_BOT_TOKEN = "8081319184:AAGee84Nz53FAkodYXqZWO50GueX3JoXIEQ";
        const TELEGRAM_CHAT_ID = "5394550159";

        // ----------------------------------------------------
        // 3. عرض المنتجات في الصفحة
        // ----------------------------------------------------
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = ""; // مسح المحتوى القديم
            
            productsList.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card rounded-[2rem] overflow-hidden group">
                        <div class="relative overflow-hidden">
                            <img src="${p.image}" alt="${p.name}" class="w-full h-72 object-cover group-hover:scale-110 transition duration-500">
                            <div class="absolute top-4 right-4 bg-red-600 text-white px-3 py-1 rounded-full text-xs font-bold shadow-lg shadow-red-500/50">تخفيض 🔥</div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold mb-2 h-14 overflow-hidden">${p.name}</h3>
                            <p class="text-sm mb-4 opacity-70 h-10">${p.description}</p>
                            <div class="flex items-center justify-between mb-6">
                                <div>
                                    <span class="text-2xl font-black" style="color: var(--primary);">${p.price}</span>
                                    <span class="text-sm font-bold mr-1" style="color: var(--primary);">ج.م</span>
                                </div>
                                <div class="text-sm line-through opacity-50">${p.oldPrice} ج.م</div>
                            </div>
                            <button onclick="openModal('${p.id}', '${p.price}', '${p.name}')" class="w-full text-white font-bold py-4 rounded-2xl transition duration-300 flex items-center justify-center gap-2" style="background: var(--primary);">
                                اطلب الآن
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // ----------------------------------------------------
        // 4. التحكم في الثيمات والأشكال والنوافذ (Modals)
        // ----------------------------------------------------
        function changeTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            generate3DShapes(themeName === 'neon' ? '#6366f1' : (themeName === 'light' ? '#cbd5e1' : '#374151'));
        }

        function generate3DShapes(color) {
            const container = document.getElementById('shapesContainer');
            container.innerHTML = '';
            for(let i=0; i<15; i++) {
                let size = Math.random() * 80 + 30;
                let left = Math.random() * 100;
                let duration = Math.random() * 10 + 10;
                let delay = Math.random() * 10;
                
                container.innerHTML += `<div class="shape-3d" style="width:${size}px; height:${size}px; left:${left}%; animation-duration:${duration}s; animation-delay:${delay}s; border-color:${color};"></div>`;
            }
        }

        function openModal(id, price, name) {
            document.getElementById('prod_id').value = id;
            document.getElementById('prod_price').value = price;
            document.getElementById('prod_name').value = name;
            document.getElementById('orderModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // ----------------------------------------------------
        // 5. إرسال البيانات للتليجرام
        // ----------------------------------------------------
        document.getElementById('taagerForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = `<span class="loader"></span> جاري التأكيد...`;
            btn.disabled = true;

            const qty = parseInt(document.getElementById('cust_qty').value);
            const price = parseFloat(document.getElementById('prod_price').value);
            const total = qty * price;

            const data = {
                id: document.getElementById('prod_id').value,
                name: document.getElementById('prod_name').value,
                cust_name: document.getElementById('cust_name').value,
                qty: qty,
                total: total,
                phone: document.getElementById('cust_phone').value,
                phone2: document.getElementById('cust_phone2').value || "لا يوجد",
                province: document.getElementById('cust_province').value,
                city: document.getElementById('cust_city').value,
                street: document.getElementById('cust_street').value,
                building: document.getElementById('cust_building').value,
                apt: document.getElementById('cust_apt').value
            };

            const message = `
🌟 **طلب جديد ومفصل** 🌟
-------------------------
🛍️ **المنتج:** ${data.name}
🆔 **الكود:** \`${data.id}\`
🔢 **الكمية:** ${data.qty}
💰 **الإجمالي المطلوب:** ${data.total} ج.م
-------------------------
👤 **العميل:** ${data.cust_name}
📱 **رقم 1:** \`${data.phone}\`
📞 **رقم 2:** \`${data.phone2}\`
📍 **المحافظة:** ${data.province}
🏙️ **المدينة:** ${data.city}
🏠 **العنوان الدقيق:** شارع ${data.street} - عمارة ${data.building} - شقة ${data.apt}
-------------------------
⚠️ *تذكير: نفذ الطلب في تطبيق تاجر*`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    closeModal('orderModal');
                    document.getElementById('successModal').classList.remove('hidden');
                    e.target.reset();
                } else {
                    alert("❌ حدث خطأ، يرجى المحاولة مرة أخرى.");
                }
            } catch (err) {
                alert("❌ فشل الاتصال. يرجى التأكد من الإنترنت.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // تشغيل الوظائف عند فتح الصفحة
        window.onload = () => {
            renderProducts();
            generate3DShapes('#6366f1');
        };
    </script>
</body>
</html>
